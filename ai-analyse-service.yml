server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_analysis
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ai-analyse-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.aianalyseservice.dto.event
        spring.json.value.default.type: com.example.aianalyseservice.dto.event.DocumentUploadedEvent
        spring.json.use.type.headers: false

ai-analyse-service:
  kafka:
    topic:
      document-uploaded: document-uploaded
      analysis-results: document-analysis-results

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info